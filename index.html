<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Calculator</h1>
    <div id="display">
        
    </div>
    <div class="numbers">
        <div class="row">
            <button type="button" value="perc" onclick="calc(this)" class="keyButton">%</button>
            <button type="button" value="divide" onclick="calc(this)" class="keyButton">/</button>
            <button type="button" value="clear" onclick="calc(this)" class="keyButton">C</button>
            <button type="button" value="del" onclick="calc(this)" class="keyButton">⌫</button>
        </div>
        <div class="row">
            <button type="button" value="7" onclick="calc(this)" class="keyButton" data-key="7">7</button>
            <button type="button" value="9" onclick="calc(this)" class="keyButton" data-key="9">9</button>
            <button type="button" value="8" onclick="calc(this)" class="keyButton" data-key="8">8</button>
            <button type="button" value="mul" onclick="calc(this)" class="keyButton">x</button>
        </div>
        <div class="row">
            <button type="button" value="4" onclick="calc(this)" class="keyButton">4</button>
            <button type="button" value="5" onclick="calc(this)" class="keyButton">5</button>
            <button type="button" value="6" onclick="calc(this)" class="keyButton">6</button>
            <button type="button" value="sub" onclick="calc(this)" class="keyButton">-</button>
        </div>
        <div class="row">
            <button type="button" value="1" onclick="calc(this)" class="keyButton">1</button>
            <button type="button" value="2" onclick="calc(this)" class="keyButton">2</button>
            <button type="button" value="3" onclick="calc(this)" class="keyButton">3</button>
            <button type="button" value="add" onclick="calc(this)" class="keyButton">+</button>
        </div>
        <div class="row">
            <button type="button" value="neg" onclick="calc(this)">+/-</button>
            <button type="button" value="0" onclick="calc(this)" class="keyButton">0</button>
            <button type="button" value="decimal" onclick="calc(this)" class="keyButton">.</button>
            <button type="button" value="answer" onclick="answer()" class="keyButton">=</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
